name: Déploiement GitHub Pages

on:
  push:
    branches:
      - "claude/video-generation-ads-mvk84o"
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurer Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Préparer les fichiers du site
        run: |
          mkdir -p _site
          cp -r index.html assets demos product .nojekyll _site/ 2>/dev/null || true
          # README utile mais non servi comme page d'accueil
          cp README.md _site/ 2>/dev/null || true

      - name: Téléverser l'artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Déployer sur Pages
        id: deployment
        uses: actions/deploy-pages@v4
