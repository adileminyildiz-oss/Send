<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<meta name="description" content="Détail d'une annonce BâtiLink : chantier, aide, artisan ou offre de sous-traitance.">
<title>Détail — BâtiLink</title>
<link rel="stylesheet" href="../assets/css/batilink.css">
<script>document.documentElement.className += ' js';</script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M3 21h18M5 21V8l7-5 7 5v13M9 21v-6h6v6' fill='none' stroke='%23f6b53d' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<style>
  .detail-grid{display:grid;grid-template-columns:1fr 320px;gap:26px;align-items:start}
  .dmain .dhead{display:flex;align-items:center;gap:16px;margin-bottom:18px}
  .dmain .dic{width:60px;height:60px;flex:none;border-radius:14px;display:grid;place-items:center;font-size:30px;
    background:color-mix(in srgb,var(--hi) 13%,transparent);border:1px solid color-mix(in srgb,var(--hi) 26%,transparent)}
  .dmain h1{font-size:clamp(24px,3.4vw,34px);letter-spacing:-.02em;font-weight:820}
  .dtags{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .block{border:1px solid var(--line);border-radius:14px;background:var(--surface);padding:22px 24px;margin-bottom:16px}
  .block h3{font-size:16px;font-weight:750;margin-bottom:12px}
  .block p{color:var(--muted);font-size:14.5px;line-height:1.65}
  .kv{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .kv .i{background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:12px 14px}
  .kv .i .l{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2)}
  .kv .i .t{font-size:14.5px;font-weight:600;margin-top:3px}
  .checklist{list-style:none;display:flex;flex-direction:column;gap:10px}
  .checklist li{display:flex;gap:10px;font-size:14px;color:var(--text)}
  .checklist li svg{width:16px;height:16px;color:var(--hi);flex:none;margin-top:3px}
  .aside{border:1px solid var(--line-2);border-radius:16px;background:var(--surface);padding:22px 24px;position:sticky;top:82px}
  .aside .big{font-family:var(--mono);font-size:26px;font-weight:600;color:var(--hi)}
  .aside .lbl{color:var(--muted-2);font-size:12.5px;font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase}
  .aside .btn{width:100%;margin-top:14px}
  .aside .row{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
  .aside .row:last-of-type{border-bottom:none}
  .aside .row b{color:var(--text)}
  .review{border-top:1px solid var(--line);padding-top:14px;margin-top:14px}
  .review .rh{display:flex;align-items:center;gap:10px}
  .review .av{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-weight:700;color:var(--hi-ink);background:linear-gradient(150deg,var(--hi),var(--hi-2))}
  .review .stars-sm{color:var(--hi);font-size:12px}
  @media (max-width:820px){.detail-grid{grid-template-columns:1fr}.aside{position:static}}
</style>
</head>
<body>

<header class="site"><div class="wrap nav">
  <a class="brand" href="../index.html"><span class="mk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V8l7-5 7 5v13M9 21v-6h6v6"/></svg></span> Bâti<b>Link</b></a>
  <nav class="links"><a href="index.html?type=chantiers">Chantiers</a><a href="index.html?type=aides">Aides</a><a href="index.html?type=artisans">Artisans</a><a href="index.html?type=sous-traitance">Sous-traitance</a></nav>
  <div class="right">
    <button class="btn btn-ghost themebtn" id="theme" aria-label="Thème"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></button>
    <a class="btn btn-ghost" href="../compte/index.html">Connexion</a>
    <button class="burger" id="burger" aria-label="Menu" aria-expanded="false"><span></span><span></span><span></span></button>
  </div>
</div></header>
<nav class="mobile-nav" id="mobileNav">
  <a href="index.html?type=chantiers">Chantiers</a><a href="index.html?type=aides">Aides</a><a href="index.html?type=artisans">Artisans</a><a href="index.html?type=sous-traitance">Sous-traitance</a>
  <div class="sep"></div><div class="cta"><a class="btn btn-hi" href="../compte/index.html">Connexion</a></div>
</nav>

<div class="pagehead"><div class="wrap">
  <div class="crumb"><a href="../index.html">Accueil</a> / <a id="crumbType" href="index.html">Résultats</a> / Détail</div>
</div></div>

<section><div class="wrap">
  <div id="content"></div>
</div></section>

<footer class="site"><div class="wrap foot-bot" style="border-top:none;margin-top:0"><p>© 2026 BâtiLink — une activité du cabinet AEM-CONSEIL.</p><p class="mono">DONNÉES D'EXEMPLE · DÉMO</p></div></footer>

<script src="../assets/js/data.js"></script>
<script src="../assets/js/batilink.js"></script>
<script>
(function(){
  var DATA = window.BATILINK_DATA || {};
  var params = new URLSearchParams(location.search);
  var type = params.get('type'); if(!DATA[type]) type='chantiers';
  var id = parseInt(params.get('id'),10);
  var cfg = DATA[type];
  var it = cfg.items[id];
  var crumb = document.getElementById('crumbType');
  crumb.textContent = cfg.label; crumb.href = 'index.html?type='+type;
  var out = document.getElementById('content');
  if(!it){ out.innerHTML = '<div class="empty">Élément introuvable. <a href="index.html?type='+type+'">Retour aux résultats</a></div>'; return; }
  document.title = it.titre + ' — BâtiLink';

  function stars(n){var s='';for(var i=0;i<5;i++)s+=i<n?'★':'☆';return s;}
  function tag(t,c){return t?'<span class="pill '+(c||'hi')+'">'+t+'</span>':'';}

  var aside, body;
  if(cfg.kind==='artisan'){
    aside = '<div class="lbl">Note</div><div class="big">'+it.note+'/5</div><div class="stars-sm" style="color:var(--hi)">'+stars(it.note)+'</div>'+
      '<div class="row" style="margin-top:14px"><span>Métier</span><b>'+it.metier+'</b></div>'+
      '<div class="row"><span>Zone</span><b>'+it.ville+'</b></div>'+
      '<div class="row"><span>Avis</span><b>'+it.avis+'</b></div>'+
      (it.badge?'<div class="row"><span>Label</span><b>'+it.badge+'</b></div>':'')+
      '<a class="btn btn-hi" href="../compte/index.html">Contacter cet artisan</a>'+
      '<a class="btn btn-ghost" href="../compte/index.html" style="margin-top:8px">Demander un devis</a>';
    body = '<div class="block"><h3>Présentation</h3><p>'+it.desc+'</p></div>'+
      '<div class="block"><h3>Prestations</h3><ul class="checklist">'+
        ['Dépannage &amp; interventions','Installation neuve','Rénovation','Devis gratuit','Garantie décennale'].map(function(p){return '<li><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M20 6 9 17l-5-5"/></svg>'+p+'</li>';}).join('')+
      '</ul></div>'+
      '<div class="block"><h3>Avis clients</h3>'+
        '<div class="review"><div class="rh"><span class="av">C</span><div><b>Client vérifié</b> <span class="stars-sm">'+stars(5)+'</span><div style="color:var(--muted-2);font-size:12px">'+it.ville+'</div></div></div><p style="margin-top:8px">« Travail soigné, ponctuel et prix respecté. Je recommande. »</p></div>'+
        '<div class="review"><div class="rh"><span class="av">M</span><div><b>Client vérifié</b> <span class="stars-sm">'+stars(it.note)+'</span><div style="color:var(--muted-2);font-size:12px">'+it.ville+'</div></div></div><p style="margin-top:8px">« Bon contact, intervention rapide. Rien à redire. »</p></div>'+
      '</div>';
  } else if(cfg.kind==='aide'){
    aside = '<div class="lbl">Montant</div><div class="big">'+it.budget+'</div>'+
      '<div class="row" style="margin-top:14px"><span>Type</span><b>'+it.metier+'</b></div>'+
      '<div class="row"><span>Périmètre</span><b>'+it.ville+'</b></div>'+
      '<div class="row"><span>Conditions</span><b>'+it.delai+'</b></div>'+
      '<a class="btn btn-hi" href="../aides/index.html">Vérifier mon éligibilité</a>'+
      '<a class="btn btn-ghost" href="../compte/index.html" style="margin-top:8px">Être accompagné</a>';
    body = '<div class="block"><h3>En quoi consiste cette aide ?</h3><p>'+it.desc+'</p></div>'+
      '<div class="block"><h3>Points clés</h3><ul class="checklist">'+
        ['Dispositif '+(it.tag||'de soutien')+' pour vos travaux','Cumulable avec d\'autres aides (sous conditions)','Accompagnement AEM-CONSEIL pour le montage du dossier'].map(function(p){return '<li><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M20 6 9 17l-5-5"/></svg>'+p+'</li>';}).join('')+
      '</ul></div>';
  } else {
    aside = '<div class="lbl">Budget estimé</div><div class="big">'+it.budget+'</div>'+
      '<div class="row" style="margin-top:14px"><span>Métier</span><b>'+it.metier+'</b></div>'+
      '<div class="row"><span>Localisation</span><b>'+it.ville+'</b></div>'+
      '<div class="row"><span>Délai</span><b>'+it.delai+'</b></div>'+
      '<a class="btn btn-hi" href="../compte/index.html">Répondre à ce chantier</a>'+
      '<a class="btn btn-ghost" href="../compte/index.html" style="margin-top:8px">Poser une question</a>';
    body = '<div class="block"><h3>Description du projet</h3><p>'+it.desc+'</p></div>'+
      '<div class="block"><h3>Informations</h3><div class="kv">'+
        '<div class="i"><div class="l">Métier recherché</div><div class="t">'+it.metier+'</div></div>'+
        '<div class="i"><div class="l">Localisation</div><div class="t">'+it.ville+'</div></div>'+
        '<div class="i"><div class="l">Budget</div><div class="t">'+it.budget+'</div></div>'+
        '<div class="i"><div class="l">Délai</div><div class="t">'+it.delai+'</div></div>'+
      '</div></div>'+
      '<div class="block"><h3>Ce que le client attend</h3><ul class="checklist">'+
        ['Un devis détaillé et gratuit','Un professionnel assuré et qualifié','Une intervention dans les délais annoncés'].map(function(p){return '<li><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M20 6 9 17l-5-5"/></svg>'+p+'</li>';}).join('')+
      '</ul></div>';
  }

  out.innerHTML =
    '<div class="detail-grid"><div class="dmain">'+
      '<div class="dhead"><div class="dic">'+it.e+'</div><div><h1>'+it.titre+'</h1>'+
        '<div class="dtags">'+tag(it.tag||it.badge, it.badge?'ok':'hi')+'<span class="pill">'+it.metier+'</span><span class="pill">📍 '+it.ville+'</span></div>'+
      '</div></div>'+ body +
      '<a href="index.html?type='+type+'" style="color:var(--hi);font-weight:600;font-size:14px">← Retour aux résultats</a>'+
    '</div><aside class="aside">'+ aside +'<button class="btn btn-ghost" id="favBtn" style="width:100%;margin-top:8px"></button></aside></div>';

  // Favoris (partagés avec l'espace client)
  if (window.BLFav) {
    var favBtn = document.getElementById('favBtn');
    var favObj = { type: type, id: id, titre: it.titre, metier: it.metier, ville: it.ville };
    var paintFav = function () {
      var on = window.BLFav.has(type, id);
      favBtn.textContent = on ? '★ Enregistré — retirer' : '☆ Sauvegarder dans mes favoris';
      favBtn.classList.toggle('btn-hi', on); favBtn.classList.toggle('btn-ghost', !on);
    };
    favBtn.addEventListener('click', function () { window.BLFav.toggle(favObj); paintFav(); });
    paintFav();
  }
})();
</script>
</body>
</html>
